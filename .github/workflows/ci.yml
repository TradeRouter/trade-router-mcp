name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax check
        run: node --check trade-router-mcp.mjs

      - name: Run tests
        run: npm test

  pack-check:
    name: Verify tarball is clean (no token leaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Dry-run pack
        run: npm pack --dry-run 2>&1 | tee pack.log

      - name: Fail if .mcpregistry_ or .env files are in tarball
        run: |
          if grep -E '\.mcpregistry_|\.env([^a-zA-Z]|$)' pack.log; then
            echo "::error::Tarball contains sensitive/ephemeral files — files: whitelist is not protecting properly."
            exit 1
          fi
          echo "Tarball is clean."

      - name: Upload tarball for inspection
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: '*.tgz'
          if-no-files-found: ignore
